<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>FOKUS-CODE Settings</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #10B981;
      --primary-hover: #059669;
      --bg: #F9FAFB;
      --card-bg: #FFFFFF;
      --text: #1F2937;
      --text-muted: #6B7280;
      --border: #E5E7EB;
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 640px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .logo-icon {
      font-size: 28px;
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #111827;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Card Frame */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 30px;
      box-shadow: var(--shadow-lg);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .card:hover {
      transform: translateY(-2px);
    }

    .section-header {
      margin-bottom: 24px;
    }

    .section-title {
      font-family: 'Outfit', sans-serif;
      font-size: 18px;
      font-weight: 600;
      color: #111827;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-description {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    /* Input Group styling */
    .input-group {
      display: flex;
      margin-bottom: 20px;
      gap: 8px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #FFFFFF;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s ease;
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.02);
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.12), inset 0 1px 2px rgba(0, 0, 0, 0.02);
    }

    .add-btn {
      padding: 12px 24px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 2px 4px rgba(16, 185, 129, 0.1);
    }

    .add-btn:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 8px rgba(16, 185, 129, 0.2);
    }

    .add-btn:active {
      transform: translateY(0);
    }

    /* Count & Panel Layout */
    .blocklist-count {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .domain-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 400px;
      overflow-y: auto;
      padding-right: 4px;
    }

    /* Custom scrollbar */
    .domain-list::-webkit-scrollbar {
      width: 6px;
    }
    .domain-list::-webkit-scrollbar-track {
      background: transparent;
    }
    .domain-list::-webkit-scrollbar-thumb {
      background: #E5E7EB;
      border-radius: 10px;
    }
    .domain-list::-webkit-scrollbar-thumb:hover {
      background: #D1D5DB;
    }

    /* Domain List Item */
    .domain-item {
      background: #FFFFFF;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid var(--border);
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .domain-item:hover {
      border-color: #D1D5DB;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
      transform: translateX(2px);
    }

    .domain-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .domain-name {
      font-weight: 500;
      color: #374151;
    }

    .domain-tag-default {
      font-size: 10px;
      font-weight: 600;
      color: var(--primary-hover);
      background: #ECFDF5;
      padding: 2px 6px;
      border-radius: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Remove Button */
    .remove-btn {
      background: #FEF2F2;
      color: #EF4444;
      border: none;
      border-radius: 8px;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .remove-btn:hover {
      background: #EF4444;
      color: white;
      transform: scale(1.05);
    }

    .remove-btn:active {
      transform: scale(0.95);
    }

    /* Notification Toast */
    .notification {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #111827;
      color: white;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      display: none;
      align-items: center;
      gap: 8px;
      z-index: 1000;
      animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-container">
        <span class="logo-icon">💻</span>
        <h1>FOKUS-CODE Settings</h1>
      </div>
      <div class="subtitle">Customize distracting sites blocked by Focus Mode</div>
    </header>

    <div class="card">
      <div class="section-header">
        <div class="section-title">
          <span>🛡️ Focus Mode Blocklist</span>
        </div>
        <div class="section-description">
          When Focus Mode is enabled, access to the following distracting websites will be immediately blocked to keep you in the zone.
        </div>
      </div>

      <div class="input-group">
        <input type="text" id="blocklistInput" placeholder="e.g., youtube.com" autofocus>
        <button id="addBlocklistDomain" class="add-btn">Add Site</button>
      </div>

      <div class="blocklist-count">
        <span id="blocklistCount">0 sites blocked</span>
      </div>

      <div class="domain-list" id="blocklistDomains">
        <!-- Domains will be loaded dynamically here -->
      </div>
    </div>
  </div>

  <div id="notification" class="notification"></div>

  <script src="options.js"></script>
</body>
</html>
