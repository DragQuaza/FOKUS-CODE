<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blocked</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        .blocked-text {
            font-size: 48px;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .blocked-image {
            max-width: 90%;
            max-height: 70vh;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.4);
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        .blocked-image:hover {
            transform: scale(1.02);
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .subtitle {
            font-size: 16px;
            opacity: 0.7;
            margin-top: 20px;
            font-weight: 300;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="quote-container" id="quoteContainer" style="margin-bottom: 25px; font-size: 26px; font-weight: 600; font-style: italic; max-width: 80%; color: #10B981; line-height: 1.4; text-shadow: 0 0 10px rgba(16, 185, 129, 0.3);"></div>
        <img src="blocked-image.jpg" alt="Site Blocked" class="blocked-image">
        <div class="fallback-content" style="display: none;">
            <div class="blocked-text">BLOCKED</div>
            <div class="subtitle">This site is blocked by Focus Mode</div>
        </div>
    </div>
    
    <script src="blocked.js"></script>
</body>
</html>
